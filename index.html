<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Judgement — Card Game Scorer</title>
<style>
  :root {
    --bg-1: #0b1020;
    --bg-2: #1a1035;
    --bg-3: #0d2440;
    --panel: rgba(30, 41, 59, 0.7);
    --panel-solid: #1e293b;
    --panel-2: rgba(51, 65, 85, 0.5);
    --accent: #f59e0b;
    --accent-2: #38bdf8;
    --accent-3: #a78bfa;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --good: #22c55e;
    --bad: #ef4444;
    --red-suit: #f87171;
    --black-suit: #e2e8f0;
    --border: rgba(148, 163, 184, 0.2);
    --glow-red: rgba(248, 113, 113, 0.35);
    --glow-black: rgba(226, 232, 240, 0.2);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    min-height: 100vh;
    padding: 14px 16px 32px;
    background:
      radial-gradient(1200px 600px at 10% -10%, rgba(167, 139, 250, 0.25), transparent 60%),
      radial-gradient(900px 500px at 100% 0%, rgba(56, 189, 248, 0.18), transparent 60%),
      radial-gradient(800px 400px at 50% 100%, rgba(245, 158, 11, 0.15), transparent 60%),
      linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 50%, var(--bg-3) 100%);
    background-attachment: fixed;
  }
  .container {
    max-width: 1150px;
    margin: 0 auto;
  }
  h1 {
    text-align: center;
    margin: 0 0 2px;
    font-size: 26px;
    letter-spacing: 0.5px;
    background: linear-gradient(90deg, #f59e0b, #a78bfa, #38bdf8);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    font-weight: 800;
  }
  .subtitle {
    text-align: center;
    color: var(--muted);
    margin-bottom: 14px;
    font-size: 12px;
  }
  .panel {
    background: var(--panel);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.05);
  }
  .panel h2 {
    margin-top: 0;
    margin-bottom: 10px;
    font-size: 15px;
    letter-spacing: 0.3px;
  }
  .players-setup {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 14px;
  }
  @media (max-width: 700px) {
    .players-setup { grid-template-columns: repeat(2, 1fr); }
  }
  .player-input {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .player-input label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    font-weight: 600;
  }
  input[type="text"], input[type="number"] {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 11px 13px;
    border-radius: 10px;
    font-size: 15px;
    outline: none;
    transition: all 0.18s ease;
    width: 100%;
  }
  input[type="number"] {
    text-align: center;
    font-weight: 700;
    font-size: 18px;
    padding: 10px 6px;
  }
  input[type="text"]:focus, input[type="number"]:focus {
    border-color: var(--accent-2);
    box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
    background: rgba(71, 85, 105, 0.6);
  }
  button {
    background: linear-gradient(135deg, #f59e0b, #fbbf24);
    color: #1f1205;
    border: none;
    padding: 11px 20px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.3px;
    transition: all 0.12s ease;
    box-shadow: 0 4px 14px rgba(245, 158, 11, 0.3);
  }
  button:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(245, 158, 11, 0.45);
  }
  button:active { transform: translateY(1px); }
  button.secondary {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    box-shadow: none;
  }
  button.secondary:hover { background: rgba(71, 85, 105, 0.7); box-shadow: none; }
  button.danger {
    background: linear-gradient(135deg, #ef4444, #f87171);
    color: white;
    box-shadow: 0 4px 14px rgba(239, 68, 68, 0.3);
  }
  button.danger:hover { box-shadow: 0 6px 20px rgba(239, 68, 68, 0.45); }

  /* === Trump + Round Display === */
  .round-hero {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 18px;
    align-items: center;
    padding: 12px 18px;
    border-radius: 14px;
    background:
      linear-gradient(135deg, rgba(167, 139, 250, 0.08), rgba(56, 189, 248, 0.05));
    border: 1px solid var(--border);
    margin-bottom: 12px;
    position: relative;
    overflow: hidden;
  }
  .round-hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 30% 50%, var(--trump-glow, transparent), transparent 50%);
    pointer-events: none;
  }
  @media (max-width: 800px) {
    .round-hero {
      grid-template-columns: 1fr;
      text-align: center;
    }
  }
  .trump-card {
    position: relative;
    z-index: 1;
    width: 90px;
    height: 126px;
    background: linear-gradient(145deg, #ffffff 0%, #f3f4f6 100%);
    border-radius: 10px;
    border: 1px solid rgba(0,0,0,0.08);
    box-shadow:
      0 8px 28px rgba(0,0,0,0.5),
      inset 0 1px 0 rgba(255,255,255,0.9),
      0 0 40px var(--trump-glow, rgba(255,255,255,0.1));
    transform: rotate(-4deg);
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    font-family: "Georgia", "Times New Roman", serif;
  }
  .trump-card:hover { transform: rotate(0deg) scale(1.05); }
  .trump-card.red { color: #c21807; }
  .trump-card.black { color: #0a0a0a; }
  .trump-card .corner {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    line-height: 1;
    font-weight: 700;
  }
  .trump-card .corner .rank-letter {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -1px;
  }
  .trump-card .corner .corner-suit {
    font-size: 13px;
    margin-top: 1px;
  }
  .trump-card .corner.tl { top: 5px; left: 7px; }
  .trump-card .corner.br {
    bottom: 5px;
    right: 7px;
    transform: rotate(180deg);
  }
  .trump-card .center-suit {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 58px;
    line-height: 1;
    text-shadow: 0 2px 6px rgba(0,0,0,0.08);
  }
  .trump-card .pip-decor {
    position: absolute;
    font-size: 14px;
    opacity: 0.45;
  }
  .trump-card .pip-decor.top-right { top: 10px; right: 10px; }
  .trump-card .pip-decor.bottom-left { bottom: 10px; left: 10px; }
  .round-hero-info {
    position: relative;
    z-index: 1;
  }
  .round-label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    font-weight: 700;
  }
  .round-number {
    font-size: 28px;
    font-weight: 800;
    line-height: 1.1;
    margin: 2px 0;
    background: linear-gradient(90deg, #f1f5f9, #94a3b8);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .trump-name-big {
    font-size: 16px;
    font-weight: 700;
  }
  .trump-name-big.red { color: var(--red-suit); }
  .trump-name-big.black { color: var(--black-suit); }
  .meta-chips {
    display: flex;
    gap: 8px;
    margin-top: 6px;
    flex-wrap: wrap;
  }
  @media (max-width: 800px) {
    .meta-chips { justify-content: center; }
  }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
  }
  .chip strong { color: var(--accent); }
  .round-progress {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 10px;
  }
  @media (max-width: 800px) {
    .round-progress { align-items: center; }
  }
  .progress-track {
    width: 200px;
    height: 8px;
    background: var(--panel-2);
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-3), var(--accent-2), var(--accent));
    border-radius: 999px;
    transition: width 0.4s ease;
  }
  .progress-label {
    font-size: 12px;
    color: var(--muted);
  }

  /* === Bid/Made entry === */
  /* Transposed entry grid: players as columns */
  .entry-table {
    display: grid;
    grid-template-columns: 96px repeat(4, 1fr);
    gap: 8px;
    align-items: stretch;
  }
  .entry-table .row-label {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 8px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    font-weight: 700;
  }
  .entry-table .player-header {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 6px 4px;
    background: rgba(15, 23, 42, 0.5);
    border-radius: 10px;
    border: 1px solid var(--border);
  }
  .entry-table .player-header .avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: 700;
    font-size: 14px;
  }
  .entry-table .player-header .name {
    font-size: 12px;
    font-weight: 700;
    text-align: center;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .entry-table .cell {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .entry-table input[type="number"] {
    padding: 8px 4px;
    font-size: 18px;
    height: 42px;
  }
  .made-toggle {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
    background: rgba(15, 23, 42, 0.5);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 3px;
    width: 100%;
    height: 42px;
  }
  .made-toggle button {
    background: transparent;
    border: none;
    padding: 4px;
    border-radius: 7px;
    cursor: pointer;
    font-weight: 700;
    font-size: 12px;
    color: var(--muted);
    box-shadow: none;
    transition: all 0.15s ease;
  }
  .made-toggle button:hover { background: rgba(148, 163, 184, 0.1); color: var(--text); transform: none; box-shadow: none; }
  .made-toggle button.active.yes {
    background: linear-gradient(135deg, #22c55e, #4ade80);
    color: #052e16;
    box-shadow: 0 2px 8px rgba(34, 197, 94, 0.35);
  }
  .made-toggle button.active.no {
    background: linear-gradient(135deg, #ef4444, #f87171);
    color: #450a0a;
    box-shadow: 0 2px 8px rgba(239, 68, 68, 0.35);
  }
  .entry-row:focus-within {
    border-color: var(--accent-2);
    box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.15);
  }
  .entry-row .player-name {
    font-weight: 700;
    font-size: 15px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .entry-row .player-name .avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    color: white;
    font-weight: 700;
  }
  .points-preview {
    text-align: center;
    font-weight: 800;
    font-size: 18px;
    padding: 8px 6px;
    border-radius: 10px;
    background: rgba(15, 23, 42, 0.5);
    border: 1px dashed var(--border);
    transition: all 0.2s ease;
    height: 42px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .points-preview.win {
    color: var(--good);
    border-color: var(--good);
    background: rgba(34, 197, 94, 0.1);
  }
  .points-preview.lose {
    color: var(--bad);
    border-color: var(--bad);
    background: rgba(239, 68, 68, 0.1);
  }
  .bid-sum {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 12px;
    background: rgba(15, 23, 42, 0.5);
    border-radius: 8px;
    margin-top: 10px;
    margin-bottom: 10px;
    font-size: 12px;
  }
  .bid-sum .sum-val { font-weight: 700; color: var(--accent-2); }
  .bid-sum .sum-val.warn { color: var(--accent); }

  .actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  /* === Leaderboard === */
  .leaderboard {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  @media (max-width: 700px) {
    .leaderboard { grid-template-columns: repeat(2, 1fr); }
  }
  .score-card {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 12px;
    text-align: center;
    position: relative;
    transition: all 0.2s ease;
    overflow: hidden;
  }
  .score-card::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, var(--player-color, transparent), transparent 60%);
    opacity: 0.15;
    pointer-events: none;
  }
  .score-card.leader {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent), 0 8px 30px rgba(245, 158, 11, 0.25);
    transform: translateY(-2px);
  }
  .score-card .rank {
    position: absolute;
    top: 8px;
    left: 10px;
    font-size: 11px;
    color: var(--muted);
    font-weight: 700;
    z-index: 1;
  }
  .score-card .crown {
    position: absolute;
    top: 8px;
    right: 10px;
    font-size: 18px;
    z-index: 1;
  }
  .score-card .avatar-lg {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    margin: 0 auto 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: white;
    font-weight: 700;
    z-index: 1;
    position: relative;
  }
  .score-card .name {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 2px;
    position: relative;
    z-index: 1;
  }
  .score-card .score {
    font-size: 26px;
    font-weight: 800;
    color: var(--text);
    position: relative;
    z-index: 1;
    line-height: 1;
  }
  .score-card .delta {
    font-size: 10px;
    color: var(--muted);
    margin-top: 3px;
    position: relative;
    z-index: 1;
  }
  .score-card .delta.pos { color: var(--good); }
  .score-card .delta.zero { color: var(--bad); }

  /* === History Table === */
  .table-wrap {
    overflow-x: auto;
    border-radius: 12px;
    border: 1px solid var(--border);
  }
  table {
    width: 100%;
    border-collapse: collapse;
  }
  th, td {
    padding: 11px 12px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  th {
    background: rgba(15, 23, 42, 0.6);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    font-weight: 700;
    position: sticky;
    top: 0;
  }
  th:first-child, td:first-child { text-align: left; padding-left: 16px; }
  th:last-child, td:last-child { padding-right: 16px; }
  tbody tr:hover td { background: rgba(56, 189, 248, 0.04); }
  tbody tr:last-child td { border-bottom: none; }
  .leader-cell {
    color: var(--good);
    font-weight: 700;
  }
  .total-row {
    background: linear-gradient(90deg, rgba(245, 158, 11, 0.12), rgba(56, 189, 248, 0.08));
    font-weight: 700;
  }
  .total-row td { border-top: 2px solid var(--accent); font-size: 15px; }
  .cell-score {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .cell-score .main {
    font-weight: 700;
    font-size: 15px;
  }
  .cell-score .main.zero { color: var(--bad); }
  .cell-score .main.pos { color: var(--good); }
  .cell-score .sub {
    font-size: 11px;
    color: var(--muted);
  }
  .bid-made-small {
    display: inline-block;
    font-size: 11px;
    color: var(--muted);
    background: var(--panel-2);
    padding: 2px 8px;
    border-radius: 999px;
    font-weight: 600;
  }
  .empty-state {
    text-align: center;
    color: var(--muted);
    padding: 32px;
    font-style: italic;
  }
  .round-trump-cell {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-weight: 600;
  }
  .round-trump-cell .suit-sym { font-size: 18px; }
  .round-trump-cell .suit-sym.red { color: var(--red-suit); }
  .round-trump-cell .suit-sym.black { color: var(--black-suit); }

  /* === Game Over === */
  .game-over {
    text-align: center;
    padding: 32px;
    background: linear-gradient(135deg, rgba(245,158,11,0.18), rgba(167, 139, 250, 0.15), rgba(56,189,248,0.12));
    border: 1px solid var(--accent);
    border-radius: 16px;
  }
  .game-over h2 { margin: 0 0 12px; font-size: 26px; }
  .winner-name { color: var(--accent); font-size: 38px; font-weight: 800; }

  .hidden { display: none !important; }
  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .section-header h2 { margin: 0; }

  /* Suit tone accents on panels */
  .trump-Spades   { --trump-glow: rgba(226, 232, 240, 0.25); }
  .trump-Diamonds { --trump-glow: rgba(248, 113, 113, 0.4); }
  .trump-Clubs    { --trump-glow: rgba(148, 163, 184, 0.25); }
  .trump-Hearts   { --trump-glow: rgba(248, 113, 113, 0.4); }

  /* Fade-in */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .panel, .round-hero { animation: fadeUp 0.35s ease both; }
</style>
</head>
<body>
<div class="container">
  <h1>Judgement</h1>
  <p class="subtitle">13 rounds · Trump rotates each round · Bid before you play · Match your bid exactly or score zero</p>

  <!-- Setup Panel -->
  <div id="setupPanel" class="panel">
    <h2>Player Setup</h2>
    <div class="players-setup">
      <div class="player-input">
        <label>Player 1</label>
        <input type="text" id="p1" value="Player 1" />
      </div>
      <div class="player-input">
        <label>Player 2</label>
        <input type="text" id="p2" value="Player 2" />
      </div>
      <div class="player-input">
        <label>Player 3</label>
        <input type="text" id="p3" value="Player 3" />
      </div>
      <div class="player-input">
        <label>Player 4</label>
        <input type="text" id="p4" value="Player 4" />
      </div>
    </div>
    <div class="actions">
      <button onclick="startGame()">Start Game</button>
    </div>
  </div>

  <!-- Current Standings (top) -->
  <div id="standingPanel" class="panel hidden">
    <h2>Current Standings</h2>
    <div id="leaderboard" class="leaderboard"></div>
  </div>

  <!-- Round Hero + Entry -->
  <div id="roundHero" class="round-hero hidden"></div>

  <div id="roundPanel" class="panel hidden">
    <div class="section-header">
      <h2>Enter Bid & Result</h2>
      <div style="font-size:12px; color: var(--muted);">Match bid → <strong style="color:var(--good)">bid + 10</strong> · Miss → <strong style="color:var(--bad)">0</strong></div>
    </div>
    <div id="scoreEntry"></div>
    <div id="bidSum" class="bid-sum"></div>
    <div class="actions">
      <button onclick="submitRound()">Submit Round</button>
      <button class="secondary" onclick="undoLastRound()">Undo Last Round</button>
      <button class="danger" onclick="resetGame()">Reset Game</button>
    </div>
  </div>

  <!-- Game Over -->
  <div id="gameOverPanel" class="panel hidden">
    <div class="game-over">
      <h2>🏆 Game Complete!</h2>
      <div style="color: var(--muted);">Winner</div>
      <div id="winnerName" class="winner-name"></div>
      <div id="winnerScore" style="margin-top:8px; color: var(--muted);"></div>
    </div>
    <div class="actions" style="margin-top:18px; justify-content:center;">
      <button class="secondary" onclick="undoLastRound()">Undo Last Round</button>
      <button class="danger" onclick="resetGame()">New Game</button>
    </div>
  </div>

  <!-- History -->
  <div id="historyPanel" class="panel hidden">
    <h2>Round History</h2>
    <div id="historyContent"></div>
  </div>
</div>

<script>
  const SUITS = [
    { name: 'Spades',   symbol: '♠', color: 'black' },
    { name: 'Diamonds', symbol: '♦', color: 'red'   },
    { name: 'Clubs',    symbol: '♣', color: 'black' },
    { name: 'Hearts',   symbol: '♥', color: 'red'   },
  ];
  const TOTAL_ROUNDS = 13;
  const STARTING_CARDS = 13;
  const BONUS = 10; // bid + BONUS = score if exactly met

  // Player color accents
  const PLAYER_COLORS = [
    '#38bdf8', // sky
    '#a78bfa', // violet
    '#22c55e', // green
    '#f59e0b', // amber
  ];

  let state = {
    players: [],
    rounds: [], // [{ roundNum, trump, cards, entries: [{bid, made, score}] }]
  };

  function trumpForRound(roundIndex) {
    return SUITS[roundIndex % SUITS.length];
  }

  function cardsForRound(roundIndex) {
    // Round 1 (index 0): 13 cards; decreases by 1 each round
    return STARTING_CARDS - roundIndex;
  }

  function startGame() {
    const names = ['p1', 'p2', 'p3', 'p4'].map(id => {
      const v = document.getElementById(id).value.trim();
      return v || id.toUpperCase();
    });
    state.players = names;
    state.rounds = [];
    document.getElementById('setupPanel').classList.add('hidden');
    render();
  }

  function currentRoundIndex() {
    return state.rounds.length;
  }

  function getRunningTotal(playerIdx) {
    return state.rounds.reduce((sum, r) => sum + (r.entries[playerIdx]?.score || 0), 0);
  }

  function renderLeaderboard() {
    const lb = document.getElementById('leaderboard');
    const totals = state.players.map((name, i) => ({
      name,
      score: getRunningTotal(i),
      idx: i,
      lastDelta: state.rounds.length ? (state.rounds[state.rounds.length - 1].entries[i]?.score || 0) : null
    }));
    const sorted = [...totals].sort((a, b) => b.score - a.score);
    const topScore = sorted.length ? sorted[0].score : 0;

    const rankMap = {};
    let currentRank = 0;
    let lastScore = null;
    sorted.forEach((p, idx) => {
      if (p.score !== lastScore) {
        currentRank = idx + 1;
        lastScore = p.score;
      }
      rankMap[p.idx] = currentRank;
    });

    lb.innerHTML = totals.map(p => {
      const isLeader = p.score === topScore && state.rounds.length > 0;
      const color = PLAYER_COLORS[p.idx];
      const initial = p.name.charAt(0).toUpperCase();
      let deltaHtml = '';
      if (p.lastDelta !== null) {
        const cls = p.lastDelta > 0 ? 'pos' : 'zero';
        const txt = p.lastDelta > 0 ? `+${p.lastDelta} last round` : `0 last round`;
        deltaHtml = `<div class="delta ${cls}">${txt}</div>`;
      }
      return `
        <div class="score-card ${isLeader ? 'leader' : ''}" style="--player-color: ${color}">
          <div class="rank">#${rankMap[p.idx]}</div>
          ${isLeader ? '<div class="crown">👑</div>' : ''}
          <div class="avatar-lg" style="background:${color}">${escapeHtml(initial)}</div>
          <div class="name">${escapeHtml(p.name)}</div>
          <div class="score">${p.score}</div>
          ${deltaHtml}
        </div>
      `;
    }).join('');
  }

  function renderRoundHero() {
    const roundIdx = currentRoundIndex();
    const hero = document.getElementById('roundHero');
    if (roundIdx >= TOTAL_ROUNDS) {
      hero.classList.add('hidden');
      return;
    }
    hero.classList.remove('hidden');
    const trump = trumpForRound(roundIdx);
    const cards = cardsForRound(roundIdx);
    const progressPct = (roundIdx / TOTAL_ROUNDS) * 100;

    hero.className = `round-hero trump-${trump.name}`;
    hero.innerHTML = `
      <div class="trump-card ${trump.color}" aria-label="Ace of ${trump.name}">
        <span class="corner tl">
          <span class="rank-letter">A</span>
          <span class="corner-suit">${trump.symbol}</span>
        </span>
        <span class="center-suit">${trump.symbol}</span>
        <span class="corner br">
          <span class="rank-letter">A</span>
          <span class="corner-suit">${trump.symbol}</span>
        </span>
      </div>
      <div class="round-hero-info">
        <div class="round-label">Round</div>
        <div class="round-number">${roundIdx + 1} <span style="font-size:20px; color: var(--muted); font-weight: 500;">of ${TOTAL_ROUNDS}</span></div>
        <div class="trump-name-big ${trump.color}">Trump: ${trump.name} ${trump.symbol}</div>
        <div class="meta-chips">
          <span class="chip">🎴 <strong>${cards}</strong> cards per player</span>
          <span class="chip">🎯 <strong>${cards}</strong> tricks up for grabs</span>
        </div>
      </div>
      <div class="round-progress">
        <div class="progress-label">${roundIdx} / ${TOTAL_ROUNDS} rounds played</div>
        <div class="progress-track"><div class="progress-fill" style="width:${progressPct}%"></div></div>
      </div>
    `;
  }

  function renderRoundEntry() {
    const roundIdx = currentRoundIndex();
    const panel = document.getElementById('roundPanel');
    if (roundIdx >= TOTAL_ROUNDS) {
      panel.classList.add('hidden');
      return;
    }
    panel.classList.remove('hidden');
    const cards = cardsForRound(roundIdx);

    const entry = document.getElementById('scoreEntry');
    // Transposed: players as columns, rows = Bid / Made / Points
    const headerCells = state.players.map((name, i) => {
      const color = PLAYER_COLORS[i];
      const initial = name.charAt(0).toUpperCase();
      return `
        <div class="player-header" style="border-color:${color}40">
          <span class="avatar" style="background:${color}">${escapeHtml(initial)}</span>
          <span class="name" title="${escapeHtml(name)}">${escapeHtml(name)}</span>
        </div>`;
    }).join('');

    const bidCells = state.players.map((_, i) => `
      <div class="cell">
        <input type="number" id="bid_${i}" min="0" max="${cards}" value="0" oninput="updatePreview()" />
      </div>
    `).join('');

    const madeCells = state.players.map((_, i) => `
      <div class="cell">
        <div class="made-toggle" id="made_${i}" data-made="">
          <button type="button" class="yes" onclick="setMade(${i}, true)">✓</button>
          <button type="button" class="no" onclick="setMade(${i}, false)">✗</button>
        </div>
      </div>
    `).join('');

    const pointsCells = state.players.map((_, i) => `
      <div class="cell">
        <div class="points-preview" id="preview_${i}" style="width:100%;">—</div>
      </div>
    `).join('');

    entry.innerHTML = `
      <div class="entry-table">
        <div class="row-label"></div>
        ${headerCells}
        <div class="row-label">Bid</div>
        ${bidCells}
        <div class="row-label">Made?</div>
        ${madeCells}
        <div class="row-label">Points</div>
        ${pointsCells}
      </div>
    `;

    updatePreview();

    setTimeout(() => {
      const first = document.getElementById('bid_0');
      if (first) { first.focus(); first.select(); }
    }, 30);
  }

  function setMade(playerIdx, made) {
    const wrap = document.getElementById(`made_${playerIdx}`);
    if (!wrap) return;
    wrap.dataset.made = made ? 'yes' : 'no';
    const yesBtn = wrap.querySelector('button.yes');
    const noBtn = wrap.querySelector('button.no');
    yesBtn.classList.toggle('active', made);
    noBtn.classList.toggle('active', !made);
    updatePreview();
  }

  function computeScore(bid, made) {
    return made ? (bid + BONUS) : 0;
  }

  function updatePreview() {
    const roundIdx = currentRoundIndex();
    if (roundIdx >= TOTAL_ROUNDS) return;
    const cards = cardsForRound(roundIdx);
    let bidSum = 0;
    let madeCount = 0;
    let decidedCount = 0;
    state.players.forEach((_, i) => {
      const bid = parseInt(document.getElementById(`bid_${i}`)?.value, 10) || 0;
      bidSum += bid;
      const madeWrap = document.getElementById(`made_${i}`);
      const madeVal = madeWrap ? madeWrap.dataset.made : '';
      const preview = document.getElementById(`preview_${i}`);
      if (preview) {
        if (madeVal === '') {
          preview.textContent = '—';
          preview.className = 'points-preview';
        } else {
          const made = madeVal === 'yes';
          if (made) madeCount++;
          decidedCount++;
          const score = computeScore(bid, made);
          preview.textContent = score > 0 ? `+${score}` : `0`;
          preview.className = `points-preview ${score > 0 ? 'win' : 'lose'}`;
        }
      }
    });

    const bidSumEl = document.getElementById('bidSum');
    bidSumEl.innerHTML = `
      <span>Total bids: <span class="sum-val ${bidSum === cards ? 'warn' : ''}">${bidSum}</span> / <strong>${cards}</strong> tricks available</span>
      <span style="color: var(--muted); font-size:12px;">${decidedCount === state.players.length ? '✓ ready to submit' : `${state.players.length - decidedCount} more to mark made / missed`}</span>
    `;
  }

  function submitRound() {
    const roundIdx = currentRoundIndex();
    if (roundIdx >= TOTAL_ROUNDS) return;
    const cards = cardsForRound(roundIdx);

    const entries = [];
    for (let i = 0; i < state.players.length; i++) {
      const bid = parseInt(document.getElementById(`bid_${i}`).value, 10) || 0;
      const madeWrap = document.getElementById(`made_${i}`);
      const madeVal = madeWrap ? madeWrap.dataset.made : '';
      if (madeVal === '') {
        alert(`Please mark whether ${state.players[i]} made their bid.`);
        return;
      }
      const made = madeVal === 'yes';
      entries.push({ bid, made, score: computeScore(bid, made) });
    }

    state.rounds.push({
      roundNum: roundIdx + 1,
      trump: trumpForRound(roundIdx),
      cards: cards,
      entries: entries
    });
    render();
  }

  function undoLastRound() {
    if (state.rounds.length === 0) return;
    if (!confirm('Undo the last round?')) return;
    state.rounds.pop();
    render();
  }

  function resetGame() {
    if (!confirm('Reset the entire game? All scores will be cleared.')) return;
    state = { players: [], rounds: [] };
    document.getElementById('setupPanel').classList.remove('hidden');
    document.getElementById('standingPanel').classList.add('hidden');
    document.getElementById('roundPanel').classList.add('hidden');
    document.getElementById('roundHero').classList.add('hidden');
    document.getElementById('historyPanel').classList.add('hidden');
    document.getElementById('gameOverPanel').classList.add('hidden');
  }

  function renderHistory() {
    const container = document.getElementById('historyContent');
    if (state.rounds.length === 0) {
      container.innerHTML = '<div class="empty-state">No rounds played yet. Enter bids and hands above for round 1.</div>';
      return;
    }

    let html = `<div class="table-wrap"><table><thead><tr>
      <th>#</th>
      <th>Trump</th>
      <th>Cards</th>`;
    state.players.forEach(n => {
      html += `<th>${escapeHtml(n)}</th>`;
    });
    html += `<th>Leader After</th></tr></thead><tbody>`;

    const running = new Array(state.players.length).fill(0);

    state.rounds.forEach(r => {
      r.entries.forEach((e, i) => running[i] += e.score);
      const topAfter = Math.max(...running);
      const leaderNames = state.players
        .map((n, i) => running[i] === topAfter ? n : null)
        .filter(Boolean)
        .join(', ');

      html += `<tr>
        <td><strong>${r.roundNum}</strong></td>
        <td><span class="round-trump-cell"><span class="suit-sym ${r.trump.color}">${r.trump.symbol}</span> ${r.trump.name}</span></td>
        <td>${r.cards}</td>`;
      r.entries.forEach((e, i) => {
        const cls = e.score > 0 ? 'pos' : 'zero';
        const badge = e.made ? '✓ made' : '✗ missed';
        html += `<td>
          <div class="cell-score">
            <span class="main ${cls}">${e.score > 0 ? '+' + e.score : '0'}</span>
            <span class="bid-made-small">bid ${e.bid} · ${badge}</span>
            <span class="sub">total: ${running[i]}</span>
          </div>
        </td>`;
      });
      html += `<td class="leader-cell">${escapeHtml(leaderNames)}</td></tr>`;
    });

    html += `<tr class="total-row">
      <td colspan="3">Totals${state.rounds.length < TOTAL_ROUNDS ? ' (so far)' : ''}</td>`;
    const finalTop = Math.max(...running);
    running.forEach((total, i) => {
      const isTop = total === finalTop;
      html += `<td style="${isTop ? 'color: var(--good); font-weight: 800;' : 'font-weight: 700;'}">${total}</td>`;
    });
    const winners = state.players.filter((_, i) => running[i] === finalTop).join(', ');
    html += `<td class="leader-cell">${escapeHtml(winners)}</td></tr>`;
    html += `</tbody></table></div>`;

    container.innerHTML = html;
  }

  function renderGameOver() {
    const panel = document.getElementById('gameOverPanel');
    if (state.rounds.length < TOTAL_ROUNDS) {
      panel.classList.add('hidden');
      return;
    }
    panel.classList.remove('hidden');
    const totals = state.players.map((n, i) => ({ n, s: getRunningTotal(i) }));
    const topScore = Math.max(...totals.map(t => t.s));
    const winners = totals.filter(t => t.s === topScore).map(t => t.n).join(' & ');
    document.getElementById('winnerName').textContent = winners;
    document.getElementById('winnerScore').textContent = `with ${topScore} points`;
  }

  function render() {
    if (state.players.length === 0) return;
    document.getElementById('standingPanel').classList.remove('hidden');
    document.getElementById('historyPanel').classList.remove('hidden');
    renderRoundHero();
    renderLeaderboard();
    renderRoundEntry();
    renderHistory();
    renderGameOver();
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }

  // Enter advances between bid inputs
  document.addEventListener('keydown', (e) => {
    if (e.key !== 'Enter') return;
    const active = document.activeElement;
    if (!active || !active.id) return;
    const m = active.id.match(/^bid_(\d+)$/);
    if (!m) return;
    e.preventDefault();
    const idx = parseInt(m[1], 10);
    const next = document.getElementById(`bid_${idx + 1}`);
    if (next) { next.focus(); next.select(); }
    else active.blur();
  });
</script>
</body>
</html>
